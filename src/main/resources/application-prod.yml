spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:prod-db-host}:3306/template_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

  elasticsearch:
    uris: http://${ES_HOST}:9200
    connection-timeout: 5s
    socket-timeout: 60s
