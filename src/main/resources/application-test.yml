spring:
  datasource:
    url: jdbc:mysql://test-db-host:3306/template_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USERNAME:test_user}
    password: ${DB_PASSWORD:test_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:test-redis-host}
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  elasticsearch:
    uris: http://test-es-host:9200
    connection-timeout: 3s
    socket-timeout: 30s
